<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lumina Web Terminal</title>
    <style>
        :root {
            --bg: #1E1E2E;
            --fg: #CDD6F4;
            --muted: #6C7086;
            --green: #A6E3A1;
            --red: #F38BA8;
            --cell-w: 9.6px;
            --cell-h: 20px;
            --font-size: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #status {
            position: fixed;
            top: 8px;
            right: 12px;
            font-size: 11px;
            color: var(--muted);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
        }
        #status.connected .dot { background: var(--green); }
        #status.disconnected .dot { background: var(--red); }

        #terminal {
            line-height: var(--cell-h);
            font-size: var(--font-size);
            white-space: pre;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        #terminal .row {
            display: block;
            height: var(--cell-h);
        }
        #terminal .cell {
            display: inline-block;
            width: var(--cell-w);
            height: var(--cell-h);
            text-align: center;
            vertical-align: top;
        }

        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 14px;
            gap: 12px;
            z-index: 50;
        }
        #splash.hidden { display: none; }
        #splash h1 {
            font-size: 24px;
            color: var(--fg);
            font-weight: 300;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        #splash .connecting {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="splash">
        <h1>Lumina</h1>
        <div class="connecting">Connecting to server…</div>
    </div>
    <div id="terminal" tabindex="0"></div>
    <div id="status"><span class="dot"></span><span class="label">Disconnected</span></div>
<script>
(function() {
    "use strict";

    // ── Configuration ──────────────────────────────────────────────
    var CELL_W  = 9.6;   // px per cell width  (matches CSS --cell-w)
    var CELL_H  = 20;    // px per cell height  (matches CSS --cell-h)
    var RECONNECT_MS = 2000;

    // ── DOM refs ───────────────────────────────────────────────────
    var terminal  = document.getElementById("terminal");
    var statusEl  = document.getElementById("status");
    var statusLbl = statusEl.querySelector(".label");
    var splashEl  = document.getElementById("splash");

    // ── State ──────────────────────────────────────────────────────
    var ws       = null;
    var gridW    = 0;
    var gridH    = 0;
    var rows     = [];   // rows[y] = <div.row>
    var cells    = [];   // cells[y][x] = <span.cell>

    // ── Helpers ────────────────────────────────────────────────────
    function setStatus(connected) {
        statusEl.className = connected ? "connected" : "disconnected";
        statusLbl.textContent = connected ? "Connected" : "Disconnected";
    }

    // Build or rebuild the DOM grid.
    function buildGrid(w, h) {
        if (w === gridW && h === gridH && rows.length === h) return;
        gridW = w;
        gridH = h;
        terminal.innerHTML = "";
        rows = [];
        cells = [];

        for (var y = 0; y < h; y++) {
            var rowEl = document.createElement("div");
            rowEl.className = "row";
            var rowCells = [];
            for (var x = 0; x < w; x++) {
                var span = document.createElement("span");
                span.className = "cell";
                span.textContent = " ";
                rowEl.appendChild(span);
                rowCells.push(span);
            }
            terminal.appendChild(rowEl);
            rows.push(rowEl);
            cells.push(rowCells);
        }
    }

    // Update a single cell's appearance.
    function updateCell(x, y, cellData) {
        if (y >= cells.length || x >= cells[y].length) return;
        var span = cells[y][x];
        var ch = cellData.char;
        if (!ch || ch === "\u0000") ch = " ";
        span.textContent = ch;
        span.style.color      = cellData.fg || "";
        span.style.background = cellData.bg || "";
        span.style.fontWeight = cellData.bold ? "bold" : "";
    }

    // Update all cells from render data.
    function renderFull(data) {
        buildGrid(data.width, data.height);
        for (var y = 0; y < data.height; y++) {
            if (!data.cells[y]) continue;
            for (var x = 0; x < data.width; x++) {
                if (data.cells[y][x]) updateCell(x, y, data.cells[y][x]);
            }
        }
    }

    // Update only dirty rects.
    function renderDirty(data) {
        buildGrid(data.width, data.height);
        var rects = data.dirty_rects;
        if (!rects || rects.length === 0) {
            renderFull(data);
            return;
        }
        for (var i = 0; i < rects.length; i++) {
            var r = rects[i];
            for (var y = r.y; y < r.y + r.h && y < data.height; y++) {
                if (!data.cells[y]) continue;
                for (var x = r.x; x < r.x + r.w && x < data.width; x++) {
                    if (data.cells[y][x]) updateCell(x, y, data.cells[y][x]);
                }
            }
        }
    }

    // ── WebSocket ──────────────────────────────────────────────────
    function connect() {
        var proto = location.protocol === "https:" ? "wss:" : "ws:";
        var url = proto + "//" + location.host + "/ws";
        ws = new WebSocket(url);

        ws.onopen = function() {
            setStatus(true);
            splashEl.classList.add("hidden");
            terminal.focus();
        };

        ws.onclose = function() {
            setStatus(false);
            ws = null;
            setTimeout(connect, RECONNECT_MS);
        };

        ws.onerror = function() {
            setStatus(false);
        };

        ws.onmessage = function(e) {
            var msg;
            try { msg = JSON.parse(e.data); } catch(_) { return; }

            if (msg.type === "init") {
                buildGrid(msg.data.width, msg.data.height);
                return;
            }
            if (msg.type === "full") {
                renderFull(msg.data);
                return;
            }
            if (msg.type === "dirty") {
                renderDirty(msg.data);
                return;
            }
        };
    }

    function send(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(obj));
        }
    }

    // ── Key mapping ────────────────────────────────────────────────
    var SPECIAL_KEYS = {
        "ArrowUp": "ArrowUp", "ArrowDown": "ArrowDown",
        "ArrowLeft": "ArrowLeft", "ArrowRight": "ArrowRight",
        "Enter": "Enter", "Backspace": "Backspace", "Delete": "Delete",
        "Tab": "Tab", "Escape": "Escape", "Home": "Home", "End": "End",
        "PageUp": "PageUp", "PageDown": "PageDown",
        " ": "Space",
        "F1":"F1","F2":"F2","F3":"F3","F4":"F4","F5":"F5","F6":"F6",
        "F7":"F7","F8":"F8","F9":"F9","F10":"F10","F11":"F11","F12":"F12"
    };

    function mapKey(e) {
        if (SPECIAL_KEYS[e.key]) return SPECIAL_KEYS[e.key];
        return e.key;
    }

    // ── Keyboard events ────────────────────────────────────────────
    document.addEventListener("keydown", function(e) {
        // Allow browser dev tools
        if (e.key === "F12") return;
        if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) return;

        e.preventDefault();
        send({
            type: "keydown",
            data: {
                key: mapKey(e),
                char: e.key.length === 1 ? e.key : "",
                ctrl: e.ctrlKey,
                alt: e.altKey,
                shift: e.shiftKey
            }
        });
    });

    document.addEventListener("keyup", function(e) {
        if (e.key === "F12") return;
        e.preventDefault();
        send({
            type: "keyup",
            data: {
                key: mapKey(e),
                ctrl: e.ctrlKey,
                alt: e.altKey,
                shift: e.shiftKey
            }
        });
    });

    // ── Mouse helpers ──────────────────────────────────────────────
    var BUTTON_MAP = ["left", "middle", "right"];

    function cellPos(e) {
        var rect = terminal.getBoundingClientRect();
        var x = Math.floor((e.clientX - rect.left - 4) / CELL_W); // 4 = padding
        var y = Math.floor((e.clientY - rect.top  - 4) / CELL_H);
        return {
            x: Math.max(0, Math.min(x, gridW - 1)),
            y: Math.max(0, Math.min(y, gridH - 1))
        };
    }

    // ── Mouse events ───────────────────────────────────────────────
    terminal.addEventListener("mousedown", function(e) {
        var pos = cellPos(e);
        send({
            type: "mousedown",
            data: { x: pos.x, y: pos.y, button: BUTTON_MAP[e.button] || "left" }
        });
    });

    terminal.addEventListener("mouseup", function(e) {
        var pos = cellPos(e);
        send({
            type: "mouseup",
            data: { x: pos.x, y: pos.y, button: BUTTON_MAP[e.button] || "left" }
        });
    });

    var lastMX = -1, lastMY = -1;
    terminal.addEventListener("mousemove", function(e) {
        var pos = cellPos(e);
        if (pos.x === lastMX && pos.y === lastMY) return;
        lastMX = pos.x;
        lastMY = pos.y;
        send({
            type: "mousemove",
            data: { x: pos.x, y: pos.y }
        });
    });

    terminal.addEventListener("wheel", function(e) {
        e.preventDefault();
        var pos = cellPos(e);
        send({
            type: "scroll",
            data: { x: pos.x, y: pos.y, button: e.deltaY < 0 ? "up" : "down" }
        });
    }, { passive: false });

    terminal.addEventListener("contextmenu", function(e) { e.preventDefault(); });

    // ── Start ──────────────────────────────────────────────────────
    terminal.focus();
    connect();
})();
</script>
</body>
</html>
